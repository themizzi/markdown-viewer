name: Unit Tests and macOS E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm test
      - run: npm run package
      - run: npm run test:e2e:headless
      - run: WDIO_APP_ARGS_JSON='[]' npm run test:e2e:headless -- --spec ./e2e/features/startup-open-dialog.feature
