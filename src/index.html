<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base id="document-base" href="./" />
    <title>Markdown Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="markdown-body"></main>
    <script src="../node_modules/mermaid/dist/mermaid.min.js"></script>
    <script>
      const root = document.getElementById("app");

      if (!root) {
        throw new Error("Missing #app element");
      }

      const documentBase = document.getElementById("document-base");

      if (!(documentBase instanceof HTMLBaseElement)) {
        throw new Error("Missing document base element");
      }

      window.mermaid.initialize({
        startOnLoad: false,
        securityLevel: "strict",
        theme: "default"
      });

      function hydrateMermaid(container) {
        const codeBlocks = container.querySelectorAll("pre > code.language-mermaid");

        codeBlocks.forEach((code) => {
          const pre = code.parentElement;
          if (!pre) return;

          const div = document.createElement("div");
          div.className = "mermaid";
          div.textContent = code.textContent ?? "";
          pre.replaceWith(div);
        });
      }

      async function render(documentState) {
        documentBase.href = documentState.baseHref;
        root.innerHTML = documentState.html;
        hydrateMermaid(root);
        await Promise.resolve(window.mermaid.run({ querySelector: ".mermaid" }));
      }

      async function bootstrap() {
        const initialHtml = await window.viewerApi.getHtml();
        await render(initialHtml);

        window.viewerApi.onHtmlUpdated((nextHtml) => {
          void render(nextHtml);
        });
      }

      void bootstrap();
    </script>
  </body>
</html>
