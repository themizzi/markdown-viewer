<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base id="document-base" href="./" />
    <title>Markdown Viewer</title>
    <script>
      if (/Mac|Darwin/i.test(navigator.userAgent)) {
        document.documentElement.classList.add("platform-macos");
      }
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header id="title-bar">
      <div class="toolbar">
        <button
          type="button"
          class="toc-toggle-button"
          data-testid="toc-toggle-button"
          aria-label="Toggle table of contents"
          aria-pressed="false"
        >
          TOC
        </button>
      </div>
    </header>
    <div class="layout-wrapper">
      <aside class="toc-sidebar" data-testid="toc-sidebar" hidden>
        <h2 class="sidebar-title">Table of Contents</h2>
        <p class="sidebar-empty">No table of contents available.</p>
      </aside>
      <main id="app" class="markdown-body"></main>
    </div>
    <script src="../node_modules/mermaid/dist/mermaid.min.js"></script>
    <script>
      const root = document.getElementById("app");
      const tocToggleButton = document.querySelector('[data-testid="toc-toggle-button"]');
      const tocSidebar = document.querySelector('[data-testid="toc-sidebar"]');

      if (!root) {
        throw new Error("Missing #app element");
      }

      if (!(tocToggleButton instanceof HTMLButtonElement)) {
        throw new Error("Missing table of contents toggle button");
      }

      if (!(tocSidebar instanceof HTMLElement)) {
        throw new Error("Missing table of contents sidebar");
      }

      const documentBase = document.getElementById("document-base");

      if (!(documentBase instanceof HTMLBaseElement)) {
        throw new Error("Missing document base element");
      }

      window.mermaid.initialize({
        startOnLoad: false,
        securityLevel: "strict",
        theme: "default"
      });

      function hydrateMermaid(container) {
        const codeBlocks = container.querySelectorAll("pre > code.language-mermaid");

        codeBlocks.forEach((code) => {
          const pre = code.parentElement;
          if (!pre) return;

          const div = document.createElement("div");
          div.className = "mermaid";
          div.textContent = code.textContent ?? "";
          pre.replaceWith(div);
        });
      }

      async function render(documentState) {
        documentBase.href = documentState.baseHref;
        root.innerHTML = documentState.html;
        hydrateMermaid(root);
        await Promise.resolve(window.mermaid.run({ querySelector: ".mermaid" }));
      }

      function applySidebarVisibility(visible) {
        tocSidebar.hidden = !visible;
        tocToggleButton.setAttribute("aria-pressed", visible ? "true" : "false");
      }

      async function initSidebar() {
        const initialVisibility = await window.viewerApi.sidebar.getInitialVisibility();
        applySidebarVisibility(initialVisibility);

        tocToggleButton.addEventListener("click", () => {
          void window.viewerApi.sidebar.requestToggleSidebar();
        });

        window.viewerApi.sidebar.onVisibilityChanged((visible) => {
          applySidebarVisibility(visible);
        });
      }

      async function bootstrap() {
        await initSidebar();
        const initialHtml = await window.viewerApi.getHtml();
        await render(initialHtml);

        window.viewerApi.onHtmlUpdated((nextHtml) => {
          void render(nextHtml);
        });
      }

      void bootstrap();
    </script>
  </body>
</html>
